name: Validate add-on build

on:
  push:
    branches: [main]
    paths:
      - "ctrlable/**"
      - ".github/workflows/build.yaml"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Validate build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base:latest
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base:latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (validate only)
        uses: docker/build-push-action@v6
        with:
          context: ./ctrlable
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
